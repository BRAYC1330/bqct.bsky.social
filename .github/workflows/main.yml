name: Bluesky AI Bot
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      clear_mini:
        description: 'Удалить LAST_MINI_DIGEST'
        type: boolean
        default: false
      clear_full:
        description: 'Удалить LAST_FULL_DIGEST'
        type: boolean
        default: false
      clear_contexts:
        description: 'Удалить секреты (имена через запятую или * для всех CONTEXT_0-9)'
        type: string
        default: ''
permissions:
  contents: read
jobs:
  run:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      last_processed: ${{ steps.checker.outputs.last_processed }}
      active_digest_uri: ${{ steps.run.outputs.ACTIVE_DIGEST_URI }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Clear selected secrets
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          CLEAR_MINI: ${{ github.event.inputs.clear_mini }}
          CLEAR_FULL: ${{ github.event.inputs.clear_full }}
          CLEAR_CONTEXTS: ${{ github.event.inputs.clear_contexts }}
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import os, subprocess
          clear_mini = os.environ.get("CLEAR_MINI", "false").lower() == "true"
          clear_full = os.environ.get("CLEAR_FULL", "false").lower() == "true"
          clear_ctx = os.environ.get("CLEAR_CONTEXTS", "").strip().upper()
          targets = []
          if clear_mini: targets.append("LAST_MINI_DIGEST")
          if clear_full: targets.append("LAST_FULL_DIGEST")
          if clear_ctx:
              if clear_ctx == "*":
                  targets.extend([f"CONTEXT_{i}" for i in range(10)])
              else:
                  targets.extend([t.strip() for t in clear_ctx.split(",") if t.strip()])
          if not targets:
              print("[INFO] No secrets to clear.")
              exit(0)
          repo = os.environ["GITHUB_REPOSITORY"]
          pat = os.environ["PAT"]
          env = {**os.environ, "GH_TOKEN": pat}
          for secret in targets:
              cmd = ["gh", "secret", "delete", secret, "--repo", repo]
              try:
                  subprocess.run(cmd, env=env, check=True, capture_output=True)
                  print(f"[OK] Deleted {secret}")
              except subprocess.CalledProcessError:
                  print(f"[WARN] Failed to delete {secret} (may not exist)")
          EOF
      - name: Cache pip dependencies
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install checker deps
        run: pip install httpx pyyaml
      - name: Check
        id: checker
        env:
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          BOT_DID: ${{ secrets.BOT_DID }}
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LAST_PROCESSED: ${{ secrets.LAST_PROCESSED }}
          ACTIVE_DIGEST_URI: ${{ secrets.ACTIVE_DIGEST_URI }}
          LAST_MINI_DIGEST: ${{ secrets.LAST_MINI_DIGEST }}
          LAST_FULL_DIGEST: ${{ secrets.LAST_FULL_DIGEST }}
        run: python check.py
      - name: Install heavy deps
        if: steps.checker.outputs.status == 'true'
        run: |
          pip install --upgrade pip setuptools wheel
          CMAKE_ARGS="-DGGML_BLAS=OFF -DGGML_CUDA=OFF" pip install --prefer-binary llama-cpp-python==0.3.20
          pip install pyyaml PyNaCl trafilatura
      - name: Cache model
        if: steps.checker.outputs.status == 'true'
        uses: actions/cache@v4
        with:
          path: models
          key: ${{ runner.os }}-qwen25-coder-14b-q5km-${{ hashFiles('models/**') }}
          restore-keys: |
            ${{ runner.os }}-qwen25-coder-14b-q5km-
      - name: Download model if not cached
        if: steps.checker.outputs.status == 'true'
        run: |
          set -e
          mkdir -p models
          FILE="models/qwen2.5-coder-14b-instruct-q5_k_m.gguf"
          EXPECTED_SHA256="${{ secrets.MODEL_SHA256 }}"
          if [ ! -f "$FILE" ] || [ $(stat -c%s "$FILE") -lt 1000000000 ]; then
            curl -L --retry 3 --retry-delay 10 -o "$FILE" "https://huggingface.co/Qwen/Qwen2.5-Coder-14B-Instruct-GGUF/resolve/main/qwen2.5-coder-14b-instruct-q5_k_m.gguf?download=true"
            if [ -n "$EXPECTED_SHA256" ]; then
              echo "$EXPECTED_SHA256  $FILE" | sha256sum -c -
            fi
          fi
      - name: Run Bot
        id: run
        if: steps.checker.outputs.status == 'true'
        env:
          PYTHONUNBUFFERED: "1"
          ACTIVE_DIGEST_URI: ${{ secrets.ACTIVE_DIGEST_URI }}
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          BOT_DID: ${{ secrets.BOT_DID }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          PAT: ${{ secrets.PAT }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CONTEXT_SLOT_COUNT: 10
          CONTEXT_0: ${{ secrets.CONTEXT_0 }}
          CONTEXT_1: ${{ secrets.CONTEXT_1 }}
          CONTEXT_2: ${{ secrets.CONTEXT_2 }}
          CONTEXT_3: ${{ secrets.CONTEXT_3 }}
          CONTEXT_4: ${{ secrets.CONTEXT_4 }}
          CONTEXT_5: ${{ secrets.CONTEXT_5 }}
          CONTEXT_6: ${{ secrets.CONTEXT_6 }}
          CONTEXT_7: ${{ secrets.CONTEXT_7 }}
          CONTEXT_8: ${{ secrets.CONTEXT_8 }}
          CONTEXT_9: ${{ secrets.CONTEXT_9 }}
          LINK_CACHE_TTL: 300
          ALLOWED_LINK_DOMAINS: "bsky.app,atproto.com,chainbase.com,tavily.com"
          MAX_LINK_CONTENT_SIZE: 400
          LLAMA_NO_ACCELERATE: 1
          DEBUG_OWNER: "true"
        run: python bot.py
      - name: Update secrets atomically
        if: steps.checker.outputs.status == 'true'
        run: |
          python3 << 'EOF'
          import os, subprocess
          def update_secret(key, value):
              if not value: return
              cmd = ["gh", "secret", "set", key, "--body", value, "--repo", os.environ["GITHUB_REPOSITORY"]]
              subprocess.run(cmd, env={**os.environ, "GH_TOKEN": os.environ["PAT"]}, check=True)
          for key in ["ACTIVE_DIGEST_URI"]:
              val = os.environ.get(key, "").strip()
              if val:
                  print(f"[SECRET] Updating {key}")
                  update_secret(key, val)
          EOF
        env:
          PAT: ${{ secrets.PAT }}
          LAST_PROCESSED: ${{ steps.checker.outputs.last_processed }}
          ACTIVE_DIGEST_URI: ${{ steps.run.outputs.ACTIVE_DIGEST_URI }}
      - name: Health check alert
        if: failure()
        run: |
          if [ -n "${{ secrets.ALERT_WEBHOOK }}" ]; then
            curl -X POST -H "Content-Type: application/json" \
            -d "{\"text\":\"Bluesky Bot failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ secrets.ALERT_WEBHOOK }}" || true
          fi
