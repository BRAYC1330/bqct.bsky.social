name: Bluesky AI Bot
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
concurrency:
  group: bluesky-bot-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  actions: write
jobs:
  check:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      status: ${{ steps.checker.outputs.status }}
      tasks: ${{ steps.checker.outputs.tasks }}
      state: ${{ steps.checker.outputs.state_json }}
      new_uri: ${{ steps.run.outputs.new_digest_uri }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install checker deps
        run: pip install httpx
      - name: Run checker
        id: checker
        env:
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          BOT_DID: ${{ secrets.BOT_DID }}
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LAST_PROCESSED: ${{ secrets.LAST_PROCESSED }}
        run: python src/tasks/checker.py
      - name: Install heavy deps & run bot
        if: steps.checker.outputs.status == 'true'
        id: run
        run: |
          pip install --upgrade pip setuptools wheel
          CMAKE_ARGS="-DGGML_BLAS=OFF -DGGML_CUDA=OFF" pip install --prefer-binary llama-cpp-python==0.3.20
          pip install pyyaml PyNaCl trafilatura
          mkdir -p models
          FILE="models/qwen2.5-coder-14b-instruct-q5_k_m.gguf"
          if [ ! -f "$FILE" ]; then curl -L -o "$FILE" "https://huggingface.co/Qwen/Qwen2.5-Coder-14B-Instruct-GGUF/resolve/main/qwen2.5-coder-14b-instruct-q5_k_m.gguf?download=true"; fi
          TASKS_JSON='${{ steps.checker.outputs.tasks }}' python src/core/main.py
        env:
          PYTHONUNBUFFERED: "1"
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          BOT_DID: ${{ secrets.BOT_DID }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          PAT: ${{ secrets.PAT }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LLAMA_NO_ACCELERATE: 1
          DEBUG_OWNER: "true"
      - name: Update state
        if: steps.checker.outputs.status == 'true'
        run: |
          echo '${{ steps.checker.outputs.state }}' | jq --arg uri "${{ steps.run.outputs.new_digest_uri }}" '.digest_uri = ($uri | if . == "" then .digest_uri else $uri end)' > updated_state.json
          gh secret set LAST_PROCESSED --body "$(cat updated_state.json)" --repo $GITHUB_REPOSITORY
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Alert on failure
        if: failure()
        run: |
          [ -n "${{ secrets.ALERT_WEBHOOK }}" ] && curl -X POST -H "Content-Type: application/json" -d "{\"text\":\"Bot failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" "${{ secrets.ALERT_WEBHOOK }}" || true
