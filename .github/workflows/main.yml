name: Bluesky AI Bot
on:
  workflow_dispatch:
    inputs:
      manual_digest:
        description: 'Generate digest manually (optional)'
        required: false
        type: choice
        options:
          - none
          - mini
          - full
        default: 'none'
  schedule:
    - cron: '*/15 * * * *'
concurrency:
  group: bluesky-bot-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  run:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      new_digest_uri: ${{ steps.run.outputs.new_digest_uri }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install checker deps
        run: pip install httpx

      - name: Check
        id: checker
        env:
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          BOT_DID: ${{ secrets.BOT_DID }}
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LAST_PROCESSED: ${{ secrets.LAST_PROCESSED }}
          MANUAL_DIGEST_TYPE: ${{ inputs.manual_digest }}
        run: python check.py

      - name: Install heavy deps
        if: steps.checker.outputs.status == 'true'
        run: |
          pip install --upgrade pip setuptools wheel
          CMAKE_ARGS="-DGGML_BLAS=OFF -DGGML_CUDA=OFF" pip install --prefer-binary llama-cpp-python==0.3.20
          pip install pyyaml PyNaCl trafilatura

      - name: Verify and Download Model
        if: steps.checker.outputs.status == 'true'
        run: |
          set -e
          mkdir -p models
          FILE="models/qwen2.5-coder-14b-instruct-q5_k_m.gguf"
          EXPECTED_SHA256="${{ secrets.MODEL_SHA256 }}"
          NEED_DOWNLOAD=true
          if [ -f "$FILE" ] && [ -n "$EXPECTED_SHA256" ]; then
            if echo "$EXPECTED_SHA256  $FILE" | sha256sum -c - >/dev/null 2>&1; then
              echo "[OK] Model hash verified, skipping download."
              NEED_DOWNLOAD=false
            else
              echo "[WARN] Hash mismatch, removing corrupted file."
              rm -f "$FILE"
            fi
          elif [ -f "$FILE" ] && [ -z "$EXPECTED_SHA256" ]; then
            echo "[WARN] No hash provided, assuming file is valid."
            NEED_DOWNLOAD=false
          fi
          if [ "$NEED_DOWNLOAD" = true ]; then
            echo "[INFO] Downloading model..."
            curl -L --retry 3 --retry-delay 10 -o "$FILE" "https://huggingface.co/Qwen/Qwen2.5-Coder-14B-Instruct-GGUF/resolve/main/qwen2.5-coder-14b-instruct-q5_k_m.gguf?download=true"
            if [ -n "$EXPECTED_SHA256" ]; then
              echo "[INFO] Verifying downloaded model..."
              echo "$EXPECTED_SHA256  $FILE" | sha256sum -c -
            fi
          fi

      - name: Run Bot
        id: run
        if: steps.checker.outputs.status == 'true'
        env:
          PYTHONUNBUFFERED: "1"
          TASKS_JSON: ${{ steps.checker.outputs.tasks }}
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          BOT_DID: ${{ secrets.BOT_DID }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          PAT: ${{ secrets.PAT }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LINK_CACHE_TTL: 300
          ALLOWED_LINK_DOMAINS: "bsky.app,atproto.com,chainbase.com,tavily.com"
          MAX_LINK_CONTENT_SIZE: 600
          LLAMA_NO_ACCELERATE: 1
          DEBUG_OWNER: "true"
        run: python bot.py

      - name: Update Last Processed State
        if: steps.run.outputs.all_ok == 'true'
        run: |
          python3 << 'EOF'
          import os, json, subprocess
          from datetime import datetime, timezone
          state_raw = os.environ.get("CHECKER_STATE", "{}")
          try: state = json.loads(state_raw)
          except: state = {}
          
          new_uri = os.environ.get("BOT_NEW_URI", "").strip()
          sched_type = os.environ.get("SCHED_TYPE", "").strip()
          now_str = datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")
          
          if sched_type:
              state["digest_type"] = sched_type
          state["digest_time"] = now_str
          if new_uri:
              state["digest_uri"] = new_uri
              
          final_json = json.dumps(state, ensure_ascii=False)
          cmd = ["gh", "secret", "set", "LAST_PROCESSED", "--body", final_json, "--repo", os.environ["GITHUB_REPOSITORY"]]
          subprocess.run(cmd, env={**os.environ, "GH_TOKEN": os.environ["PAT"]}, check=True)
          print("[OK] Updated LAST_PROCESSED")
          EOF
        env:
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CHECKER_STATE: ${{ steps.checker.outputs.state_json }}
          BOT_NEW_URI: ${{ steps.run.outputs.new_digest_uri }}
          SCHED_TYPE: ${{ steps.checker.outputs.scheduled_type }}

      - name: Health check alert
        if: failure()
        run: |
          if [ -n "${{ secrets.ALERT_WEBHOOK }}" ]; then
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"text\":\"Bluesky Bot failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "${{ secrets.ALERT_WEBHOOK }}" || true
          fi
