name: Bluesky Bot Runner

on:
  workflow_dispatch:

env:
  BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
  BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
  BOT_DID: ${{ secrets.BOT_DID }}
  OWNER_DID: ${{ secrets.OWNER_DID }}
  PAT: ${{ secrets.PAT }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  GITHUB_REPOSITORY: ${{ github.repository }}
  LINK_CACHE_TTL: 300
  ALLOWED_LINK_DOMAINS: bsky.app,atproto.com,chainbase.com,tavily.com
  MAX_LINK_CONTENT_SIZE: 600
  LLAMA_NO_ACCELERATE: 1
  DEBUG_OWNER: true

jobs:
  run:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install httpx
        run: pip install httpx

      - name: Run checker
        id: checker
        run: python check.py
        env:
          LAST_PROCESSED: ${{ secrets.LAST_PROCESSED }}

      - name: Install dependencies
        if: steps.checker.outputs.status == 'true'
        run: |
          pip install --upgrade pip setuptools wheel
          CMAKE_ARGS="-DGGML_BLAS=OFF -DGGML_CUDA=OFF" pip install --prefer-binary llama-cpp-python==0.3.20
          pip install pyyaml PyNaCl trafilatura

      - name: Download model
        if: steps.checker.outputs.status == 'true'
        run: |
          set -e
          mkdir -p models
          FILE="models/qwen2.5-coder-14b-instruct-q5_k_m.gguf"
          EXPECTED_SHA256="${{ secrets.MODEL_SHA256 }}"
          NEED_DOWNLOAD=true
          if [ -f "$FILE" ] && [ -n "$EXPECTED_SHA256" ]; then
            if echo "$EXPECTED_SHA256  $FILE" | sha256sum -c - >/dev/null 2>&1; then
              echo "[OK] Model hash verified, skipping download."
              NEED_DOWNLOAD=false
            else
              echo "[WARN] Hash mismatch, removing corrupted file."
              rm -f "$FILE"
            fi
          elif [ -f "$FILE" ] && [ -z "$EXPECTED_SHA256" ]; then
            echo "[WARN] No hash provided, assuming file is valid."
            NEED_DOWNLOAD=false
          fi
          if [ "$NEED_DOWNLOAD" = true ]; then
            echo "[INFO] Downloading model..."
            curl -L --retry 3 --retry-delay 10 -o "$FILE" "https://huggingface.co/Qwen/Qwen2.5-Coder-14B-Instruct-GGUF/resolve/main/qwen2.5-coder-14b-instruct-q5_k_m.gguf?download=true"
            if [ -n "$EXPECTED_SHA256" ]; then
              echo "[INFO] Verifying downloaded model..."
              echo "$EXPECTED_SHA256  $FILE" | sha256sum -c -
            fi
          fi

      - name: Run bot
        if: steps.checker.outputs.status == 'true'
        id: bot
        run: python bot.py
        env:
          PYTHONUNBUFFERED: 1
          TASKS_JSON: ${{ steps.checker.outputs.tasks }}
          STATE_JSON: ${{ steps.checker.outputs.state_json }}
          BOT_HANDLE: ${{ env.BOT_HANDLE }}
          BOT_PASSWORD: ${{ env.BOT_PASSWORD }}
          BOT_DID: ${{ env.BOT_DID }}
          OWNER_DID: ${{ env.OWNER_DID }}
          PAT: ${{ env.PAT }}
          TAVILY_API_KEY: ${{ env.TAVILY_API_KEY }}
          GITHUB_REPOSITORY: ${{ env.GITHUB_REPOSITORY }}
          LINK_CACHE_TTL: ${{ env.LINK_CACHE_TTL }}
          ALLOWED_LINK_DOMAINS: ${{ env.ALLOWED_LINK_DOMAINS }}
          MAX_LINK_CONTENT_SIZE: ${{ env.MAX_LINK_CONTENT_SIZE }}
          LLAMA_NO_ACCELERATE: ${{ env.LLAMA_NO_ACCELERATE }}
          DEBUG_OWNER: ${{ env.DEBUG_OWNER }}

      - name: Update LAST_PROCESSED state
        if: always() && steps.checker.outputs.status == 'true'
        run: |
          python3 << 'EOF'
          import os, json, subprocess
          from datetime import datetime, timezone
          state_raw = os.environ.get("CHECKER_STATE", "{}")
          try: 
              state = json.loads(state_raw)
          except: 
              state = {}
          new_uri = os.environ.get("BOT_NEW_URI", "").strip()
          sched_type = os.environ.get("SCHED_TYPE", "").strip()
          now_str = datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")
          if new_uri:
              state["digest_uri"] = new_uri
              state["digest_time"] = now_str
              if sched_type:
                  state["digest_type"] = sched_type
          elif sched_type:
              state["digest_type"] = sched_type
              state["digest_time"] = now_str
          final_json = json.dumps(state, ensure_ascii=False)
          cmd = ["gh", "secret", "set", "LAST_PROCESSED", "--body", final_json, "--repo", os.environ["GITHUB_REPOSITORY"]]
          subprocess.run(cmd, env={**os.environ, "GH_TOKEN": os.environ["PAT"]}, check=True)
          print("[OK] Updated LAST_PROCESSED")
          EOF
        env:
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CHECKER_STATE: ${{ steps.bot.outputs.state_json }}
          BOT_NEW_URI: ${{ steps.bot.outputs.new_digest_uri }}
          SCHED_TYPE: ${{ steps.bot.outputs.sched_type }}

      - name: Notify on failure
        if: failure() && env.DISCORD_WEBHOOK != ''
        run: |
          if [ -n "${{ env.DISCORD_WEBHOOK }}" ]; then
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"text\":\"Bluesky Bot failed: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "${{ env.DISCORD_WEBHOOK }}" || true
          fi
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
