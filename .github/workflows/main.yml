name: Run Bot
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      secrets: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Base Dependencies
        run: pip install httpx PyNaCl beautifulsoup4 trafilatura pyyaml

      - name: Check Notifications
        id: check
        run: python check.py
        env:
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          BOT_DID: ${{ secrets.BOT_DID }}
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LAST_PROCESSED: ${{ secrets.LAST_PROCESSED }}

      - name: Check Timers
        id: status
        run: |
          python3 -c "
          import os, sys
          sys.path.append('.')
          import timers
          has_work = os.path.exists('work_data.json')
          needs_mini = timers.check_mini_timer()
          needs_full = timers.check_full_timer()
          status = has_work or needs_mini or needs_full
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'status={\"true\" if status else \"false\"}\n')
          "
        env:
          LAST_MINI_DIGEST: ${{ secrets.LAST_MINI_DIGEST }}
          LAST_FULL_DIGEST: ${{ secrets.LAST_FULL_DIGEST }}

      - name: Upgrade Pip
        if: steps.status.outputs.status == 'true'
        run: pip install --upgrade pip setuptools wheel

      - name: Install Llama.cpp
        if: steps.status.outputs.status == 'true'
        run: pip install --prefer-binary llama-cpp-python==0.3.20
        env:
          CMAKE_ARGS: -DGGML_BLAS=OFF -DGGML_CUDA=OFF

      - name: Cache Model
        if: steps.status.outputs.status == 'true'
        uses: actions/cache@v4
        with:
          path: models
          key: Linux-qwen25-coder-14b-q5km-${{ runner.os }}
          restore-keys: Linux-qwen25-coder-14b-q5km-

      - name: Download Model
        if: steps.status.outputs.status == 'true'
        id: sha_step
        run: |
          mkdir -p models
          FILE="models/qwen2.5-coder-14b-instruct-q5_k_m.gguf"
          if [ ! -f "$FILE" ] || [ $(stat -c%s "$FILE") -lt 1000000000 ]; then
            curl -L --retry 3 --retry-delay 10 -o "$FILE" "https://huggingface.co/Qwen/Qwen2.5-Coder-14B-Instruct-GGUF/resolve/main/qwen2.5-coder-14b-instruct-q5_k_m.gguf?download=true"
          fi
          HASH=$(sha256sum "$FILE" | awk '{print $1}')
          echo "MODEL_SHA256=$HASH"
          echo "MODEL_SHA256=$HASH" >> $GITHUB_OUTPUT

      - name: Run Bot
        if: steps.status.outputs.status == 'true'
        run: python bot.py
        env:
          PYTHONUNBUFFERED: 1
          LAST_MINI_DIGEST: ${{ secrets.LAST_MINI_DIGEST }}
          LAST_FULL_DIGEST: ${{ secrets.LAST_FULL_DIGEST }}
          LAST_DIGEST_URI: ${{ secrets.LAST_DIGEST_URI }}
          ACTIVE_DIGEST_URI: ${{ secrets.ACTIVE_DIGEST_URI }}
          BOT_HANDLE: ${{ secrets.BOT_HANDLE }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          BOT_DID: ${{ secrets.BOT_DID }}
          OWNER_DID: ${{ secrets.OWNER_DID }}
          PAT: ${{ secrets.PAT }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CONTEXT_SLOT_COUNT: ${{ secrets.CONTEXT_SLOT_COUNT }}
          CONTEXT_0: ${{ secrets.CONTEXT_0 }}
          CONTEXT_1: ${{ secrets.CONTEXT_1 }}
          CONTEXT_2: ${{ secrets.CONTEXT_2 }}
          CONTEXT_3: ${{ secrets.CONTEXT_3 }}
          CONTEXT_4: ${{ secrets.CONTEXT_4 }}
          CONTEXT_5: ${{ secrets.CONTEXT_5 }}
          CONTEXT_6: ${{ secrets.CONTEXT_6 }}
          CONTEXT_7: ${{ secrets.CONTEXT_7 }}
          CONTEXT_8: ${{ secrets.CONTEXT_8 }}
          CONTEXT_9: ${{ secrets.CONTEXT_9 }}
          LINK_CACHE_TTL: ${{ secrets.LINK_CACHE_TTL }}
          ALLOWED_LINK_DOMAINS: ${{ secrets.ALLOWED_LINK_DOMAINS }}
          MAX_LINK_CONTENT_SIZE: ${{ secrets.MAX_LINK_CONTENT_SIZE }}
          RAW_DEBUG: "true"
          LLAMA_NO_ACCELERATE: 1

      - name: Update Secrets
        if: steps.status.outputs.status == 'true'
        run: |
          python3 -c "
          import os, subprocess
          def update_secret(key, value):
              if not value: return
              cmd = ['gh', 'secret', 'set', key, '--body', value, '--repo', os.environ['GITHUB_REPOSITORY']]
              subprocess.run(cmd, env={**os.environ, 'GH_TOKEN': os.environ['PAT']}, check=True)
          updates = {}
          if os.environ.get('LAST_MINI_DIGEST'): updates['LAST_MINI_DIGEST'] = os.environ['LAST_MINI_DIGEST']
          if os.environ.get('LAST_FULL_DIGEST'): updates['LAST_FULL_DIGEST'] = os.environ['LAST_FULL_DIGEST']
          if os.environ.get('LAST_DIGEST_URI'): updates['LAST_DIGEST_URI'] = os.environ['LAST_DIGEST_URI']
          if os.environ.get('ACTIVE_DIGEST_URI'): updates['ACTIVE_DIGEST_URI'] = os.environ['ACTIVE_DIGEST_URI']
          for k, v in updates.items():
              if v: update_secret(k, v)
          "
        env:
          PAT: ${{ secrets.PAT }}
          LAST_PROCESSED: ${{ steps.check.outputs.last_processed }}
          LAST_MINI_DIGEST: ${{ env.LAST_MINI_DIGEST }}
          LAST_FULL_DIGEST: ${{ env.LAST_FULL_DIGEST }}
          LAST_DIGEST_URI: ${{ env.LAST_DIGEST_URI }}
          ACTIVE_DIGEST_URI: ${{ env.ACTIVE_DIGEST_URI }}
