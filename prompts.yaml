tavily_intent: |
  Extract the core search intent from the query.
  Output format: QUERY: [cleaned query] | TIME: [day/week/month/year or omit]
  Query: {query}
  Result:

chainbase_keyword: |
  Extract the main keyword or entity from the text.
  Output format: KEYWORD: [1-3 words]
  Text: {text}
  Result:

reply: |
  You are a helpful assistant. Answer based on:
  Memory: {memory}
  Thread: {root_thread}
  Search: {search_data}
  User: {query}
  Answer concisely, max 3 sentences.

digest_refine: |
  Write a concise description for the trend "{keyword}".
  Rules:
  - Hard limit: 17 words maximum.
  - Structure: [Core fact]. [Metric]: [Value].
  - Start immediately with a date, event, or entity. NEVER start with "The trend refers to...", "This is about...", "It describes...".
  - Output ONLY the description. Do not repeat the keyword. Do not add prefixes or explanations.
  - UNDER NO CIRCUMSTANCES mention topics other than "{keyword}".
  - Always end with a period.
  Context:
  ### START CONTEXT ###
  {summary}
  ### END CONTEXT ###
  Description:

context_memory: |
  Compress the conversation history into a dense summary.
  Keep only: decisions, facts, open questions.
  History: {history}
  Summary: