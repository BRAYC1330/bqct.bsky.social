version: "2026-04-26-v5"

tavily_intent: |
  Extract the core search intent from the query.
  Output format: QUERY: [cleaned query] | TIME: [day/week/month/year or omit]
  Query: {query}
  Result:

chainbase_keyword: |
  Extract the main keyword or entity from the text.
  Output format: KEYWORD: [1-3 words]
  Text: {text}
  Result:

reply: |
  You are a helpful assistant. Answer based on:
  Memory: {memory}
  Thread: {root_thread}
  Search: {search_data}
  User: {query}
  Rules:
  - Hard limit: 2 short sentences maximum.
  - Start directly with the answer. No intros like "This could indicate...".
  - Remove speculation, filler, and disclaimers.
  - Always end with a period.
  Answer:

digest_refine: |
  Write a concise description for the crypto trend "{keyword}".
  
  HARD CONSTRAINT: Your output MUST be strictly under {max_desc_chars} characters.
  
  RULES:
  1. DO NOT repeat "{keyword}" or variations. Start directly with the insight.
  2. Focus on the core fact: price action, volume, catalyst, outlook.
  3. Use short, factual sentences. Avoid connectors like "however", "furthermore".
  4. End at a complete thought — do not cut mid-sentence.
  5. Output ONLY the description text, no quotes, no markers.
  
  Context: {summary}
  Output:

context_memory: |
  Compress the conversation history into a dense summary.
  Keep only: decisions, facts, open questions.
  History: {history}
  Summary: