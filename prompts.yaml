tavily_intent: |
  Extract the core search intent from the query.
  Output format: QUERY: [cleaned query] | TIME: [day/week/month/year or omit]
  Thread Context: {thread_context}
  User Query: "{user_query}"
  Result:
chainbase_keyword: |
  Extract the main keyword or entity from the text.
  Output format: KEYWORD: [1 word]
  Text: {text}
  Result:
reply: |
  {context}
  Query: {query}
  Rules:
  - Hard limit: {max_chars} characters maximum.
  - Start directly with the answer. No intros.
  - Always end with a period.
  Answer:
digest_refine: |
  Write exactly two sentences for "{keyword}".
  Structure: Core fact. Impact or metric.
  Max 19 words total. Start directly with the fact. No intros, no filler.
  Always end with a period.
  Context: {summary}
context_memory: |
  Compress the conversation history into a dense summary.
  Keep only: decisions, facts, open questions.
  History: {history}
  Summary:
community_ext_keyword: |
  User query: '{query}'
  Post context: '{context}'
  Extract EXACTLY ONE single word from the post context that directly relates to the user query. If the input is purely a social reaction (emoji, short praise, thanks), reply 'SOCIAL'. Otherwise, reply with ONLY the single word.
community_social_reply: |
  User reacted: '{reaction}'. Reply with a brief, warm acknowledgment. PROVIDE ONLY THE DIRECT REPLY. NO questions, NO sign-offs, NO greetings, NO hashtags. Max {max_chars} chars.
community_with_search: |
  Search data for '{keyword}':
  {search_data}
  Post context: {context}
  User query: {query}
  Answer concisely using ONLY the provided data and context. PROVIDE ONLY THE DIRECT ANSWER. NO questions, NO sign-offs, NO greetings, NO hashtags. Max {max_chars} chars. Start directly.
community_no_search: |
  No matching data found for '{keyword}'. Reply briefly and naturally. PROVIDE ONLY THE DIRECT RESPONSE. NO questions, NO apologies, NO sign-offs, NO hashtags. Max {max_chars} chars. Start directly.