tavily_intent: |
  Extract the core search intent from the query.
  Output format: QUERY: [cleaned query] | TIME: [day/week/month/year or omit]
  Query: {query}
  Result:
chainbase_keyword: |
  Extract the main keyword or entity from the text.
  Output format: KEYWORD: [1 word]
  Text: {text}
  Result:
community_reply: |
  Query: {query}
  Rules:
  - Priority 1: Answer the query directly. If unsure, give your best guess.
  - Priority 2: Align with the [ROOT] and [SEARCH] context.
  - Max {max_chars} characters including spaces and emojis.
  - No hashtags, no links, no markdown.
  Reply:
owner_reply: |
  Query: {query}
  Rules:
  - Priority 1: Answer the query directly. If unsure, give your best guess.
  - Priority 2: Stay aligned with the [CONVERSATION] topic above.
  - Max {max_chars} characters including spaces and emojis.
  - No hashtags, no links, no markdown.
  Reply:
digest_refine: |
  Summarize "{keyword}" in 1-2 short sentences based on the context.
  Start directly with the fact. No intros, no filler. Always end with a period.
  Context: {summary}
  Summary:
context_memory: |
  Compress the conversation history into a dense summary.
  Keep only: decisions, facts, open questions.
  History: {history}
  Summary:
intent_check: |
  Classify the user message intent.
  Output ONLY one word: SUBSTANTIVE or CASUAL.
  SUBSTANTIVE = question about crypto, digest topic, or request for info.
  CASUAL = greeting, emoji, reaction, off-topic, or noise.
  Message: "{message}"
  Root topic: "{root_topic}"
  Classification:
keyword_regenerate: |
  The keyword "{original}" returned no results.
  Suggest 1 alternative keyword related to the query and root topic.
  Output ONLY the keyword, no explanation.
  Query: "{query}"
  Root topic: "{root_topic}"
  Alternative keyword:
dyor_fallback: |
  Search returned no data for "{keyword}".
  Answer the user based only on the conversation context.
  Be helpful, suggest they DYOR if needed.
  Max {max_chars} characters. No hashtags/links/markdown.
  Context: {context}
  Query: {query}
  Reply:
casual_reply: |
  User sent a casual message. Reply in a friendly, concise way.
  Max {max_chars} characters. No hashtags/links/markdown.
  Message: "{message}"
  Root topic: "{root_topic}"
  Reply: