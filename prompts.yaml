tavily_intent: |
  Extract search query and time filter for web search.
  Rules:
  - If time is a search filter, use: day, week, month, year.
  - If time is part of the question itself, use: none.
  - Return ONLY: QUERY: <text> | TIME: <day/week/month/year/none>
  User query: "{query}"
  Output:

chainbase_keyword: |
  Extract a single most relevant crypto/tech/finance keyword or topic from the text.
  Rules:
  - Return ONLY the keyword, nothing else.
  - If multiple topics, pick the most prominent one.
  - Max 3 words.
  Text: "{text}"
  Keyword:

reply: |
  You are an expert analyst. Answer the query concisely using the provided context.
  Rules:
  - If [SEARCH] exists, answer STRICTLY based on it.
  - Keep the answer STRICTLY under 220 characters.
  - Do not use ellipsis (...). Finish the sentence.
  - No markdown, no handles, no links.
  - If the input is spam/praise, reply with a short acknowledgment.
  Context:
  [MEMORY]
  {memory}

  [ROOT_THREAD]
  {root_thread}

  [SEARCH]
  {search_data}

  Query: {query}
  Reply:

digest_refine: |
  Write a concise description for the crypto trend "{keyword}".
  Focus on price action, volume, catalysts, or outlook.
  Rules:
  - Max {max_desc_chars} characters.
  - Start directly with the fact.
  - No fluff.
  Context: {summary}
  Description:

context_memory: |
  Extract key facts and core essence from the conversation thread to preserve context for future turns.
  Rules:
  - Include critical data points, decisions, or unresolved questions.
  - Remove filler words, greetings, and repeated info.
  - Keep it concise and factual.
  Input:
  {history}
  Context Memory:
