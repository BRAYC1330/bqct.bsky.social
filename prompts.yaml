version: "2026-04-26-v6"

tavily_intent: |
  Extract the core search intent from the query.
  Output format: QUERY: [cleaned query] | TIME: [day/week/month/year or omit]
  Query: {query}
  Result:

chainbase_keyword: |
  Extract the main keyword or entity from the text.
  Output format: KEYWORD: [1-3 words]
  Text: {text}
  Result:

reply: |
  You are a helpful assistant. Answer based on:
  Memory: {memory}
  Thread: {root_thread}
  Search: {search_data}
  User: {query}
  Rules:
  - Hard limit: 2 short sentences maximum.
  - Start directly with the answer. No intros.
  - Always end with a period.
  Answer:

digest_refine: |
  Write a description for "{keyword}" under {max_desc_chars} characters.
  Focus on price, volume, catalyst, or outlook. Start directly with the fact.
  Always end with a period.
  Output only the description.
  Context: {summary}

context_memory: |
  Compress the conversation history into a dense summary.
  Keep only: decisions, facts, open questions.
  History: {history}
  Summary: