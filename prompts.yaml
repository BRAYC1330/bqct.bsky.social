tavily_intent: |
  Extraction of a search query and time filter for web search.
  Rules:
  - For TIME: If time is a search filter, use: day, week, month, year.
  - For TIME: If time is part of the question itself, use: none.
  - For text: Extract only the essence that that will give the most accurate answer from the web search.
  - Return ONLY: QUERY: <text> | TIME: <day/week/month/year/none>

  User query: "{query}"
  Output:

chainbase_keyword: |
  Extract from the text only one word or compound object name that constitute the essence of the query.
  Rules:
  - Cut out all small talk
  - Maximum 2 words.
  Text: "{text}"
  Keyword:

reply: |
  You are an expert analyst. Answer the query concisely, using the provided context.
  Rules:
  - The answer must not exceed 260 characters.

  Context:
  [MEMORY]
  {memory}

  [ROOT_THREAD]
  {root_thread}

  [SEARCH]
  {search_data}

digest_refine: |
  Write a concise description of the trend "{keyword}".
  Rules:
  - Hard limit: 20 words maximum.
  - No fluff.
  Context: {summary}
  Description:

context_memory: |
  Extract key facts and core essence from the conversation thread to preserve context for future turns.
  Rules:
  - Include critical data points, decisions, or unresolved questions.
  - Remove filler words, greetings, and repeated info.
  - Keep it concise and factual.
  Input:
  {history}
  Context Memory:
